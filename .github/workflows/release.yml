name: Release

# Runs when you push a version tag like v0.2.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx vsce package --no-dependencies --allow-missing-repository

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            ## Install

            1. Download `file-info-explorer-${{ steps.version.outputs.VERSION }}.vsix` below
            2. In VS Code / Cursor: `Cmd+Shift+P` → **Extensions: Install from VSIX...**
            3. Select the downloaded file and reload the window

            See [CHANGELOG.md](CHANGELOG.md) for what changed in this version.
          files: "*.vsix"
