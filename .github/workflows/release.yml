name: Release

# Runs when you push a version tag like v0.3.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package extension
        run: npx vsce package --no-dependencies --allow-missing-repository

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body: |
            See [CHANGELOG.md](CHANGELOG.md) for what changed in this version.

            ## Install via VSIX (manual)
            1. Download `file-info-explorer-${{ steps.version.outputs.VERSION }}.vsix` below
            2. `Cmd+Shift+P` → **Extensions: Install from VSIX...** → select the file
          files: "*.vsix"

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies --allow-missing-repository -p ${{ secrets.VSCE_PAT }}

      - name: Publish to OpenVSX
        run: npx ovsx publish *.vsix -p ${{ secrets.OVSX_TOKEN }}
