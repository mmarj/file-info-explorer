<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Main page gradient: deep navy to rich blue -->
    <linearGradient id="pageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2D6BC4"/>
    </linearGradient>
    <!-- Fold corner gradient -->
    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4C9BE8"/>
      <stop offset="100%" style="stop-color:#1A3055"/>
    </linearGradient>
    <!-- Badge gradient: warm amber -->
    <linearGradient id="badgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5C842"/>
      <stop offset="100%" style="stop-color:#E09000"/>
    </linearGradient>
    <!-- Subtle drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Document body (with folded corner) -->
  <path d="M22 14 L86 14 L106 34 L106 114 Q106 118 102 118 L26 118 Q22 118 22 114 Z"
        fill="url(#pageGrad)" filter="url(#shadow)"/>

  <!-- Folded corner triangle -->
  <path d="M86 14 L106 34 L86 34 Z"
        fill="url(#foldGrad)" opacity="0.85"/>

  <!-- Corner fold crease line -->
  <line x1="86" y1="14" x2="86" y2="34" stroke="#4C9BE8" stroke-width="0.5" opacity="0.5"/>

  <!-- Content lines — representing file metadata rows -->
  <!-- Line 1: short (label-like) -->
  <rect x="34" y="52" width="26" height="5" rx="2.5" fill="#4C9BE8" opacity="0.7"/>
  <!-- Line 1: value -->
  <rect x="64" y="52" width="30" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Line 2: short label -->
  <rect x="34" y="65" width="26" height="5" rx="2.5" fill="#4C9BE8" opacity="0.7"/>
  <!-- Line 2: value -->
  <rect x="64" y="65" width="22" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Line 3: short label -->
  <rect x="34" y="78" width="26" height="5" rx="2.5" fill="#4C9BE8" opacity="0.7"/>
  <!-- Line 3: value -->
  <rect x="64" y="78" width="26" height="5" rx="2.5" fill="white" opacity="0.9"/>

  <!-- Subtle divider line -->
  <line x1="34" y1="96" x2="94" y2="96" stroke="#4C9BE8" stroke-width="0.75" opacity="0.3"/>

  <!-- Info badge circle (bottom-right) -->
  <circle cx="93" cy="93" r="22" fill="url(#badgeGrad)" filter="url(#badgeShadow)"/>

  <!-- "i" in badge -->
  <!-- dot -->
  <circle cx="93" cy="83" r="3" fill="#1E3A5F"/>
  <!-- stem -->
  <rect x="90" y="89" width="6" height="14" rx="3" fill="#1E3A5F"/>
</svg>
